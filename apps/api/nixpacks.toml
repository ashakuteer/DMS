[phases.setup]
nixPkgs = ["nodejs-22_x"]

[phases.install]
cmds = [
  "npm install --legacy-peer-deps --omit=dev",
  "npm install --legacy-peer-deps --save-dev @nestjs/cli prisma typescript"
]

[phases.build]
cmds = [
  "npx prisma generate --schema=prisma/schema.prisma",
  "npm run build"
]

[start]
cmd = "node --max-old-space-size=512 dist/src/main.js"
